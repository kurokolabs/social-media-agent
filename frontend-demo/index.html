<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Kuroko Labs Social Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="page-login">

  <!-- Logo -->
  <div class="login-logo-wrap">
    <img src="assets/img/logo.png" alt="Kuroko Labs" />
  </div>

  <!-- Login card -->
  <div class="login-card">
    <p class="tag">Social Agent</p>
    <h2>Dashboard Login</h2>

    <div class="login-error" id="login-error">
      Ungültige Anmeldedaten. Bitte prüfe E-Mail und Passwort.
    </div>

    <form id="login-form" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="admin@kurokolabs.de"
          value="admin@kurokolabs.de"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Passwort</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          value="demo123"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        Anmelden
      </button>
    </form>

    <hr class="login-divider" />

    <p class="demo-hint">
      Demo-Zugang: <strong>admin@kurokolabs.de</strong> / <strong>demo123</strong>
    </p>
  </div>

  <p class="login-footer">© 2026 Kuroko Labs GmbH · München</p>

  <script>
    const DEMO_EMAIL = 'admin@kurokolabs.de';
    const DEMO_PASS  = 'demo123';

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      const btn   = document.getElementById('login-btn');
      const err   = document.getElementById('login-error');

      err.classList.remove('visible');
      btn.textContent = 'Wird geprüft…';
      btn.disabled = true;

      setTimeout(() => {
        if (email === DEMO_EMAIL && pass === DEMO_PASS) {
          btn.textContent = 'Weiterleitung…';
          sessionStorage.setItem('kl-auth', '1');
          window.location.href = 'dashboard.html';
        } else {
          btn.textContent = 'Anmelden';
          btn.disabled = false;
          err.classList.add('visible');
        }
      }, 650);
    }

    // If already logged in, skip to dashboard
    if (sessionStorage.getItem('kl-auth') === '1') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
